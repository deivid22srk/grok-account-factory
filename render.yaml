# Render Blueprint for grok-proxy-cli account factory web UI (static site)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: static
    name: grok-account-factory
    buildCommand: npm install && npm run build
    publishPath: out
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
